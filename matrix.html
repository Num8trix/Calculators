<!DOCTYPE html>
<html>
<head>
<title>Matrix - Num8trix</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="nav"></div>

<div class="container">

<div class="card">
<h2>Matrix Calculator</h2>

<input id="a" placeholder="Matrix A (1,2,3;4,5,6)">
<input id="b" placeholder="Matrix B">

<button onclick="add()">Add</button>
<button onclick="sub()">Subtract</button>

<div class="result" id="out"></div>
</div>

</div>

<script src="app.js"></script>
<script>document.getElementById("nav").innerHTML=nav();</script>

<script>
function parse(m){
  return m.split(";").map(r=>r.split(",").map(Number));
}

function add(){
  let A=parse(a.value), B=parse(b.value);
  let R=A.map((r,i)=>r.map((v,j)=>v+B[i][j]));
  out.innerText=JSON.stringify(R,null,2);
}

function sub(){
  let A=parse(a.value), B=parse(b.value);
  let R=A.map((r,i)=>r.map((v,j)=>v-B[i][j]));
  out.innerText=JSON.stringify(R,null,2);
}
</script>

</body>
</html>
