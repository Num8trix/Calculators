<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Calculator - Num8trix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="nav"></div>

<div class="container">
  <div class="card">
    <h2>Matrix Operations</h2>
    <p>Enter matrices using commas for columns and semicolons for rows.<br>Example: <code>1,2,3;4,5,6</code></p>

    <input id="a" placeholder="Matrix A">
    <input id="b" placeholder="Matrix B (optional)">

    <button onclick="add()">Add</button>
    <button onclick="sub()">Subtract</button>

    <div class="result" id="out"></div>
  </div>
</div>

<footer>Num8trix Matrix Calculator</footer>

<script src="app.js"></script>
<script>document.getElementById("nav").innerHTML = nav();</script>

<script>
function parseMatrix(m) {
  return m.split(";").map(r => r.split(",").map(Number));
}

function add() {
  try {
    const A = parseMatrix(a.value), B = parseMatrix(b.value);
    const R = A.map((r,i)=>r.map((v,j)=>v + B[i][j]));
    out.textContent = JSON.stringify(R, null, 2);
  } catch(e) {
    out.textContent = "⚠️ Invalid input.";
  }
}

function sub() {
  try {
    const A = parseMatrix(a.value), B = parseMatrix(b.value);
    const R = A.map((r,i)=>r.map((v,j)=>v - B[i][j]));
    out.textContent = JSON.stringify(R, null, 2);
  } catch(e) {
    out.textContent = "⚠️ Invalid input.";
  }
}
</script>

</body>
</html>
