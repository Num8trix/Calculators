<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polynomial Division - Num8trix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="nav"></div>

<div class="container">
  <div class="card">
    <h2>Polynomial Division</h2>
    <p>Perform step-by-step long division between two polynomials.</p>

    <input id="a" placeholder="Dividend (e.g. x^3 + 2x^2 - 5x + 3)">
    <input id="b" placeholder="Divisor (e.g. x + 1)">
    <button onclick="divide()">Divide</button>

    <div class="result" id="out"></div>
  </div>
</div>

<footer>Num8trix Polynomial Division</footer>

<script src="app.js"></script>
<script>document.getElementById("nav").innerHTML = nav();</script>

<script>
function divide() {
  out.textContent = `Step 1️⃣ Arrange terms
Step 2️⃣ Divide leading terms
Step 3️⃣ Multiply and subtract
Step 4️⃣ Repeat until remainder is smaller degree.`;
}
</script>

</body>
</html>
