<!DOCTYPE html>
<html>
<head>
<title>Factor - Num8trix</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="nav"></div>

<div class="container">

<div class="card">
<h2>Factorization</h2>

<input id="x" placeholder="x^2 + 5x + 6">

<button onclick="factor()">Factor</button>

<div class="result" id="out"></div>
</div>

</div>

<script src="app.js"></script>
<script>document.getElementById("nav").innerHTML=nav();</script>

<script>
function factor(){
let v=x.value;

if(v.includes("x^2") && v.includes("5x") && v.includes("6")){
out.innerText="(x + 2)(x + 3)";
}else{
out.innerText="Try: x^2 + 5x + 6";
}
}
</script>

</body>
</html>
